<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Khetho May KPI Report · Loading</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cinzel:wght@400;500;600;700;900&family=DM+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }

body {
  background:linear-gradient(135deg, #010810 0%, #020c18 50%, #0a2040 100%);
  display:flex; align-items:center; justify-content:center;
  font-family:'DM Sans', sans-serif; color:#f4f8ff;
}

.loader-container {
  position:relative; width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:3rem;
}

/* Background canvas */
canvas { position:fixed; top:0; left:0; z-index:0; }

.loader-content {
  position:relative; z-index:10;
  text-align:center;
  animation:fadeIn 0.8s ease forwards;
}

@keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

.loader-text {
  font-family:'Playfair Display', serif;
  font-size:clamp(2rem, 8vw, 4.5rem);
  font-weight:900;
  line-height:1.1;
  margin-bottom:1rem;
  background:linear-gradient(110deg, #ffffff 0%, #f4f8ff 20%, #e8f3ff 40%, #cfe5ff 55%, #a8ccee 70%, #8cb2d0 85%, #c8d8e8 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:-0.02em;
  animation:textReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
  opacity:0;
}

@keyframes textReveal {
  from { opacity:0; transform:translateY(30px) scale(0.95); }
  to { opacity:1; transform:translateY(0) scale(1); }
}

.loader-subtitle {
  font-family:'Cinzel', serif;
  font-size:clamp(0.7rem, 1.2vw, 0.9rem);
  letter-spacing:0.3em;
  text-transform:uppercase;
  color:rgba(140, 178, 208, 0.6);
  margin-bottom:3rem;
  animation:fadeIn 1s ease 1s forwards;
  opacity:0;
}

/* Animated loading bars */
.loader-bars {
  display:flex;
  gap:0.5rem;
  align-items:flex-end;
  justify-content:center;
  height:60px;
}

.bar {
  width:6px;
  background:linear-gradient(180deg, #2278e0, #62c0ff);
  border-radius:10px;
  animation:barWave 1.2s ease-in-out infinite;
  box-shadow:0 0 12px rgba(34, 120, 224, 0.6);
}

.bar:nth-child(1) { height:20%; animation-delay:0s; }
.bar:nth-child(2) { height:40%; animation-delay:0.1s; }
.bar:nth-child(3) { height:60%; animation-delay:0.2s; }
.bar:nth-child(4) { height:40%; animation-delay:0.3s; }
.bar:nth-child(5) { height:20%; animation-delay:0.4s; }

@keyframes barWave {
  0%, 100% { height:20%; opacity:0.5; }
  50% { height:80%; opacity:1; }
}

/* Orbiting particles */
.orbit-container {
  position:absolute;
  width:200px;
  height:200px;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  z-index:5;
}

.orbit {
  position:absolute;
  width:100%;
  height:100%;
  border:1px solid rgba(34, 120, 224, 0.1);
  border-radius:50%;
}

.orbit:nth-child(1) { animation:rotate 12s linear infinite; }
.orbit:nth-child(2) { animation:rotate 18s linear infinite reverse; width:70%; height:70%; top:15%; left:15%; }
.orbit:nth-child(3) { animation:rotate 24s linear infinite; width:40%; height:40%; top:30%; left:30%; }

@keyframes rotate { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }

.orbit-dot {
  position:absolute;
  width:8px;
  height:8px;
  background:#62c0ff;
  border-radius:50%;
  top:0;
  left:50%;
  transform:translateX(-50%);
  box-shadow:0 0 15px rgba(98, 192, 255, 0.8);
}

/* Loading progress text */
.progress-text {
  position:fixed;
  bottom:3rem;
  left:50%;
  transform:translateX(-50%);
  font-family:'Space Mono', monospace;
  font-size:0.75rem;
  letter-spacing:0.2em;
  color:rgba(140, 178, 208, 0.5);
  animation:fadeIn 1.5s ease 1.5s forwards;
  opacity:0;
}

.progress-dot {
  display:inline-block;
  width:4px;
  height:4px;
  background:#62c0ff;
  border-radius:50%;
  margin:0 0.3rem;
  animation:pulse 1.5s ease-in-out infinite;
}

.progress-dot:nth-child(1) { animation-delay:0s; }
.progress-dot:nth-child(2) { animation-delay:0.2s; }
.progress-dot:nth-child(3) { animation-delay:0.4s; }

@keyframes pulse { 0%, 100% { opacity:0.3; } 50% { opacity:1; } }

/* Glow effect */
.glow {
  position:absolute;
  width:400px;
  height:400px;
  background:radial-gradient(circle, rgba(34, 120, 224, 0.15) 0%, transparent 70%);
  border-radius:50%;
  filter:blur(40px);
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  animation:glowPulse 3s ease-in-out infinite;
  z-index:3;
}

@keyframes glowPulse { 0%, 100% { opacity:0.5; } 50% { opacity:1; } }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div class="loader-container">
  <!-- Orbiting elements -->
  <div class="orbit-container">
    <div class="glow"></div>
    <div class="orbit">
      <div class="orbit-dot"></div>
    </div>
    <div class="orbit">
      <div class="orbit-dot"></div>
    </div>
    <div class="orbit">
      <div class="orbit-dot"></div>
    </div>
  </div>

  <!-- Main content -->
  <div class="loader-content">
    <div class="loader-text">Khetho May KPI Report</div>
    <div class="loader-subtitle">Brandscapers Africa · 2026</div>
    
    <!-- Loading bars -->
    <div class="loader-bars">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </div>

  <!-- Progress indicator -->
  <div class="progress-text">
    LOADING
    <span class="progress-dot"></span>
    <span class="progress-dot"></span>
    <span class="progress-dot"></span>
  </div>
</div>

<script>
// Starfield background
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Create stars
const stars = Array.from({length:150}, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  r: Math.random() * 1.5 + 0.2,
  a: Math.random() * 0.6 + 0.2,
  sp: Math.random() * 0.008 + 0.002,
  ph: Math.random() * Math.PI * 2
}));

let time = 0;

function drawStars() {
  time += 0.008;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  stars.forEach(star => {
    const alpha = star.a * (0.4 + 0.6 * Math.sin(time * star.sp + star.ph));
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(172, 208, 240, ${alpha})`;
    ctx.fill();
  });
  
  requestAnimationFrame(drawStars);
}

drawStars();

// Navigate to report after delay
setTimeout(() => {
  window.location.href = './REPORT/index.html';
}, 4500);
</script>
</body>
</html>
