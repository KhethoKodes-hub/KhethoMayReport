<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Khetho May KPI · Hyperion Loading</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cinzel:wght@400;500;600;700;900&family=DM+Sans:wght@200;300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }

body {
  background:#010810;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'DM Sans', sans-serif;
  color:#f4f8ff;
}

/* Layered canvas stack */
canvas { position:fixed; top:0; left:0; }
#bg-canvas { z-index:0; }
#nebula-canvas { z-index:1; }
#particles-canvas { z-index:2; }
#glow-canvas { z-index:3; }

/* Scanline & Vignette */
.scanlines {
  position:fixed; inset:0; z-index:4; pointer-events:none;
  background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
}
.vignette {
  position:fixed; inset:0; z-index:5; pointer-events:none;
  background:radial-gradient(ellipse 75% 75% at 50% 50%, transparent 35%, rgba(1,8,16,0.92) 100%);
}

/* Main container */
.loader-container {
  position:relative; z-index:20;
  width:100%; height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  backdrop-filter: blur(2px);
}

/* ——— 3D HYPERION RING SYSTEM ——— */
.ring-system {
  position:relative;
  width:380px;
  height:380px;
  margin-bottom:-140px;
  flex-shrink:0;
  filter: drop-shadow(0 0 20px rgba(34,120,224,0.3));
}

.ring-wrapper {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  animation: systemFloat 6s ease-in-out infinite;
}

@keyframes systemFloat {
  0%,100% { transform: translateY(0px) rotate(0deg); }
  50% { transform: translateY(-8px) rotate(2deg); }
}

.ring {
  position:absolute;
  border-radius:50%;
  border-style: solid;
  border-width: 1.5px;
  border-color: transparent;
  box-shadow: 0 0 12px rgba(98,192,255,0.2);
}

.ring-1 {
  width:340px; height:340px;
  border-top-color: rgba(98,192,255,0.9);
  border-right-color: rgba(34,120,224,0.3);
  border-bottom-color: rgba(98,192,255,0.15);
  border-left-color: rgba(34,120,224,0.6);
  animation: spin1 5s linear infinite;
}
.ring-2 {
  width:280px; height:280px;
  border-top-color: rgba(34,120,224,0.2);
  border-right-color: rgba(98,192,255,0.7);
  border-bottom-color: rgba(140,178,208,0.4);
  border-left-color: transparent;
  animation: spin2 4s linear infinite reverse;
}
.ring-3 {
  width:210px; height:210px;
  border-top-color: transparent;
  border-right-color: rgba(140,178,208,0.5);
  border-bottom-color: rgba(34,120,224,0.8);
  border-left-color: rgba(98,192,255,0.3);
  animation: spin1 6s linear infinite;
}
.ring-4 {
  width:140px; height:140px;
  border-top-color: rgba(98,192,255,0.6);
  border-right-color: transparent;
  border-bottom-color: rgba(34,120,224,0.3);
  border-left-color: rgba(98,192,255,0.8);
  animation: spin2 3s linear infinite;
}
.ring-5 {
  width:80px; height:80px;
  border-top-color: rgba(140,178,208,0.7);
  border-right-color: rgba(98,192,255,0.4);
  border-bottom-color: rgba(34,120,224,0.5);
  border-left-color: rgba(140,178,208,0.2);
  animation: spin1 2.4s linear infinite reverse;
}

/* Orbital energy particles */
.orbit-particle {
  position:absolute;
  width:6px;
  height:6px;
  background: radial-gradient(circle, #62c0ff, #2278e0);
  border-radius:50%;
  top:-3px;
  left:50%;
  transform:translateX(-50%);
  box-shadow:0 0 18px #62c0ff;
  animation: orbitFloat 6s linear infinite;
}
.orbit-particle:nth-child(1) { animation-duration: 4.2s; width:5px; height:5px; top:-2.5px; background:#a8d4f5; }
.orbit-particle:nth-child(2) { animation-duration: 5.8s; width:8px; height:8px; top:-4px; background:#ffffff; box-shadow:0 0 24px white; }
.orbit-particle:nth-child(3) { animation-duration: 7.2s; width:4px; height:4px; top:-2px; background:#3da8f5; }

@keyframes orbitFloat {
  from { transform: translateX(-50%) rotate(0deg); }
  to { transform: translateX(-50%) rotate(360deg); }
}

/* Central stellar core */
.core {
  position:absolute;
  width:70px; height:70px;
  border-radius:50%;
  background: radial-gradient(circle at 35% 35%, #2a6ab0, #030c1a);
  border:1px solid rgba(98,192,255,0.7);
  box-shadow:
    0 0 0 6px rgba(34,120,224,0.12),
    0 0 0 14px rgba(34,120,224,0.05),
    0 0 48px rgba(34,120,224,0.5);
  display:flex; align-items:center; justify-content:center;
  animation: coreBreathing 3s ease-in-out infinite;
}
.core-inner {
  width:26px; height:26px;
  border-radius:50%;
  background: radial-gradient(circle at 40% 40%, #ffffff, #62c0ff);
  animation: corePulse 2.2s ease-in-out infinite;
  box-shadow:0 0 20px rgba(98,192,255,0.9);
}

@keyframes coreBreathing {
  0%,100% { transform: scale(1); box-shadow:0 0 0 6px rgba(34,120,224,0.12), 0 0 0 14px rgba(34,120,224,0.05), 0 0 48px rgba(34,120,224,0.5); }
  50% { transform: scale(1.04); box-shadow:0 0 0 12px rgba(34,120,224,0.2), 0 0 0 22px rgba(34,120,224,0.08), 0 0 70px rgba(34,120,224,0.8); }
}
@keyframes corePulse {
  0%,100% { transform: scale(1); opacity:0.9; }
  50% { transform: scale(1.2); opacity:1; }
}
@keyframes spin1 { to { transform:rotate(360deg); } }
@keyframes spin2 { to { transform:rotate(-360deg); } }

/* ——— TEXT CONTENT WITH GLITCH ——— */
.loader-content {
  position:relative; z-index:21;
  text-align:center;
  padding:0 2rem;
  animation: riseIn 1s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
  opacity:0;
}
@keyframes riseIn {
  from { opacity:0; transform:translateY(30px); filter: blur(4px); }
  to { opacity:1; transform:translateY(0); filter: blur(0); }
}

.eyebrow {
  font-family:'Space Mono', monospace;
  font-size:clamp(0.6rem, 1vw, 0.75rem);
  letter-spacing:0.45em;
  text-transform:uppercase;
  color:rgba(98,192,255,0.6);
  margin-bottom:1.2rem;
  display:flex; align-items:center; justify-content:center; gap:1rem;
}
.eyebrow::before, .eyebrow::after {
  content:'';
  display:block;
  width:42px; height:1px;
  background:linear-gradient(90deg, transparent, rgba(98,192,255,0.5));
}
.eyebrow::after { transform:scaleX(-1); }

.loader-text {
  font-family:'Playfair Display', serif;
  font-size:clamp(2.4rem, 8vw, 5rem);
  font-weight:900;
  line-height:1.08;
  letter-spacing:-0.02em;
  background:linear-gradient(145deg, #ffffff 0%, #e8f3ff 20%, #a8d4f5 45%, #62c0ff 70%, #8cb2d0 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:0.6rem;
  position:relative;
}
.loader-text::after {
  content:attr(data-text);
  position:absolute;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:linear-gradient(145deg, #2278e0, #62c0ff);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  opacity:0.2;
  clip-path: inset(0 0 0 0);
  animation: textGlitch 3s infinite;
}
@keyframes textGlitch {
  0%,100% { clip-path: inset(0 0 0 0); opacity:0; }
  2% { clip-path: inset(10% 0 30% 0); opacity:0.8; }
  4% { clip-path: inset(60% 0 5% 0); opacity:0.5; }
  6% { clip-path: inset(0 0 0 0); opacity:0; }
}

.loader-subtitle {
  font-family:'Cinzel', serif;
  font-size:clamp(0.7rem, 1.2vw, 0.85rem);
  letter-spacing:0.32em;
  text-transform:uppercase;
  color:rgba(140,178,208,0.6);
  margin-bottom:2.8rem;
}

/* ——— DATA STREAM BARS (kinetic) ——— */
.data-stream {
  display:flex;
  gap:4px;
  align-items:flex-end;
  justify-content:center;
  height:55px;
  margin-bottom:2rem;
}
.stream-bar {
  width:3.5px;
  border-radius:3px;
  background:linear-gradient(180deg, #62c0ff, #1a5fa8);
  animation: streamBarRise 1.2s ease-in-out infinite alternate;
  transform-origin: bottom;
}
@keyframes streamBarRise {
  0% { height: 8%; opacity:0.3; transform:scaleY(0.8); }
  100% { height: 100%; opacity:1; transform:scaleY(1); }
}
.stream-bar:nth-child(1)  { animation-delay:0.00s; }
.stream-bar:nth-child(2)  { animation-delay:0.05s; }
.stream-bar:nth-child(3)  { animation-delay:0.10s; }
.stream-bar:nth-child(4)  { animation-delay:0.15s; }
.stream-bar:nth-child(5)  { animation-delay:0.20s; }
.stream-bar:nth-child(6)  { animation-delay:0.25s; }
.stream-bar:nth-child(7)  { animation-delay:0.30s; }
.stream-bar:nth-child(8)  { animation-delay:0.35s; }
.stream-bar:nth-child(9)  { animation-delay:0.40s; }
.stream-bar:nth-child(10) { animation-delay:0.45s; }
.stream-bar:nth-child(11) { animation-delay:0.50s; }
.stream-bar:nth-child(12) { animation-delay:0.55s; }
.stream-bar:nth-child(13) { animation-delay:0.60s; }
.stream-bar:nth-child(14) { animation-delay:0.65s; }
.stream-bar:nth-child(15) { animation-delay:0.70s; }
.stream-bar:nth-child(16) { animation-delay:0.75s; }
.stream-bar:nth-child(17) { animation-delay:0.80s; }
.stream-bar:nth-child(18) { animation-delay:0.85s; }
.stream-bar:nth-child(19) { animation-delay:0.90s; }
.stream-bar:nth-child(20) { animation-delay:0.95s; }

/* ——— PROGRESS BAR (neon pulse) ——— */
.progress-track {
  width:min(360px, 70vw);
  height:2px;
  background:rgba(34,120,224,0.18);
  border-radius:2px;
  margin:0 auto 1.2rem;
  overflow:hidden;
  position:relative;
}
.progress-fill {
  height:100%;
  width:0%;
  background:linear-gradient(90deg, #62c0ff, #ffffff, #62c0ff);
  background-size:200% 100%;
  border-radius:2px;
  animation: progressExpand 4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards, shimmerGlow 1.8s linear infinite;
  box-shadow:0 0 15px rgba(98,192,255,0.8);
}
@keyframes progressExpand {
  0%   { width:0%; }
  20%  { width:22%; }
  45%  { width:58%; }
  70%  { width:82%; }
  100% { width:100%; }
}
@keyframes shimmerGlow {
  0%   { background-position:200% 0; }
  100% { background-position:-200% 0; }
}

/* ——— STATUS LINE & DATA INDICATORS ——— */
.status-line {
  font-family:'Space Mono', monospace;
  font-size:0.72rem;
  letter-spacing:0.2em;
  color:rgba(98,192,255,0.45);
  text-transform:uppercase;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0.8rem;
  margin-bottom: 1rem;
}
.blink-dot {
  display:inline-block;
  width:6px; height:6px;
  background:#62c0ff;
  border-radius:50%;
  box-shadow:0 0 12px #62c0ff;
  animation: pulseBlink 1s ease-in-out infinite;
}
@keyframes pulseBlink {
  0%,100% { opacity:0.3; transform:scale(0.8); }
  50% { opacity:1; transform:scale(1.2); }
}

/* ——— HUD CORNERS (enhanced) ——— */
.hud-corner {
  position:fixed;
  width:68px; height:68px;
  z-index:15;
  opacity:0.5;
  transition:opacity 0.3s;
}
.hud-tl { top:2rem; left:2rem; }
.hud-tr { top:2rem; right:2rem; transform:scaleX(-1); }
.hud-bl { bottom:2rem; left:2rem; transform:scaleY(-1); }
.hud-br { bottom:2rem; right:2rem; transform:scale(-1,-1); }
.hud-corner svg { width:100%; height:100%; filter:drop-shadow(0 0 5px #62c0ff); }

/* ——— FLOATING DATA NODES (cyber nodes) ——— */
.data-node {
  position:fixed;
  border:1px solid rgba(34,120,224,0.4);
  border-radius:6px;
  padding:0.4rem 0.9rem;
  font-family:'Space Mono', monospace;
  font-size:0.65rem;
  letter-spacing:0.12em;
  color:rgba(98,192,255,0.7);
  background:rgba(6,20,40,0.65);
  backdrop-filter:blur(8px);
  z-index:12;
  animation: nodeFloating 5s ease-in-out infinite;
  white-space: nowrap;
  box-shadow:0 0 10px rgba(34,120,224,0.2);
}
.dn-1 { top:14%; left:3%; animation-delay:0s; }
.dn-2 { top:22%; right:4%; animation-delay:1.2s; }
.dn-3 { bottom:30%; left:5%; animation-delay:2.4s; }
.dn-4 { bottom:18%; right:3%; animation-delay:0.6s; }
.dn-5 { top:8%; left:50%; transform:translateX(-50%); animation-delay:1.8s; white-space:nowrap; }
@keyframes nodeFloating {
  0%,100% { transform:translateY(0px); opacity:0.55; }
  50% { transform:translateY(-10px); opacity:1; box-shadow:0 0 18px rgba(98,192,255,0.4); }
}
.dn-5 { transform:translateX(-50%); animation: nodeFloatingCentered 5.5s ease-in-out infinite; }
@keyframes nodeFloatingCentered {
  0%,100% { transform:translateX(-50%) translateY(0px); opacity:0.6; }
  50% { transform:translateX(-50%) translateY(-12px); opacity:1; }
}

/* Radial glow behind rings */
.radial-glow {
  position:fixed;
  top:45%;
  left:50%;
  width:500px;
  height:500px;
  transform:translate(-50%, -50%);
  background:radial-gradient(circle, rgba(34,120,224,0.08) 0%, rgba(34,120,224,0.02) 40%, transparent 80%);
  z-index:8;
  pointer-events:none;
  border-radius:50%;
}
</style>
</head>
<body>

<!-- Canvas layers -->
<canvas id="bg-canvas"></canvas>
<canvas id="nebula-canvas"></canvas>
<canvas id="particles-canvas"></canvas>
<canvas id="glow-canvas"></canvas>
<div class="scanlines"></div>
<div class="vignette"></div>
<div class="radial-glow"></div>

<!-- HUD corners -->
<div class="hud-corner hud-tl"><svg viewBox="0 0 68 68" fill="none"><path d="M3 36 L3 3 L36 3" stroke="#62c0ff" stroke-width="1.8"/><path d="M3 22 L3 3 L22 3" stroke="#62c0ff" stroke-width="0.7" opacity="0.6"/><circle cx="3" cy="3" r="3.5" fill="#62c0ff"/></svg></div>
<div class="hud-corner hud-tr"><svg viewBox="0 0 68 68" fill="none"><path d="M3 36 L3 3 L36 3" stroke="#62c0ff" stroke-width="1.8"/><path d="M3 22 L3 3 L22 3" stroke="#62c0ff" stroke-width="0.7" opacity="0.6"/><circle cx="3" cy="3" r="3.5" fill="#62c0ff"/></svg></div>
<div class="hud-corner hud-bl"><svg viewBox="0 0 68 68" fill="none"><path d="M3 36 L3 3 L36 3" stroke="#62c0ff" stroke-width="1.8"/><path d="M3 22 L3 3 L22 3" stroke="#62c0ff" stroke-width="0.7" opacity="0.6"/><circle cx="3" cy="3" r="3.5" fill="#62c0ff"/></svg></div>
<div class="hud-corner hud-br"><svg viewBox="0 0 68 68" fill="none"><path d="M3 36 L3 3 L36 3" stroke="#62c0ff" stroke-width="1.8"/><path d="M3 22 L3 3 L22 3" stroke="#62c0ff" stroke-width="0.7" opacity="0.6"/><circle cx="3" cy="3" r="3.5" fill="#62c0ff"/></svg></div>

<!-- Floating nodes -->
<div class="data-node dn-1">⌇ SYS.READY ⌇</div>
<div class="data-node dn-2">KPI.STREAM · ACTIVE</div>
<div class="data-node dn-3">MAY.REPORT · 2026</div>
<div class="data-node dn-4">0x4B48H // ONLINE</div>
<div class="data-node dn-5">✦ BRANDSCAPERS AFRICA ✦</div>

<div class="loader-container">
  <div class="ring-system">
    <div class="ring-wrapper">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <div class="ring ring-4"></div>
      <div class="ring ring-5"></div>
      <div class="orbit-particle" style="top:-3px; left:50%; transform-origin:center 190px; animation: orbitFloat 5.2s linear infinite;"></div>
      <div class="orbit-particle" style="top:-4px; left:50%; transform-origin:center 140px; animation: orbitFloat 6.8s linear infinite reverse;"></div>
      <div class="core"><div class="core-inner"></div></div>
    </div>
  </div>

  <div class="loader-content">
    <div class="eyebrow">Performance Report · Q2</div>
    <div class="loader-text" data-text="Khetho · May KPI">Khetho · May KPI</div>
    <div class="loader-subtitle">Brandscapers Africa &nbsp;⎯&nbsp; 2026</div>

    <!-- Dynamic data bars -->
    <div class="data-stream" id="dynamicBars"></div>

    <!-- Progress segment -->
    <div class="progress-track"><div class="progress-fill"></div></div>

    <!-- Status area -->
    <div class="status-line" id="statusLine">
      <span class="blink-dot"></span>
      <span id="statusText">INITIALIZING SYSTEMS</span>
      <span class="blink-dot" style="animation-delay:0.5s"></span>
    </div>
  </div>
</div>

<script>
// Create dynamic bars with random heights for extra flair
const barContainer = document.getElementById('dynamicBars');
for(let i=0; i<24; i++) {
  const bar = document.createElement('div');
  bar.classList.add('stream-bar');
  bar.style.animationDelay = `${i * 0.045}s`;
  barContainer.appendChild(bar);
}

// Canvas Setup & Advanced FX
let time = 0;
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
const nebulaCanvas = document.getElementById('nebula-canvas');
const nebulaCtx = nebulaCanvas.getContext('2d');
const partCanvas = document.getElementById('particles-canvas');
const partCtx = partCanvas.getContext('2d');
const glowCanvas = document.getElementById('glow-canvas');
const glowCtx = glowCanvas.getContext('2d');

function resizeAll() {
  [bgCanvas, nebulaCanvas, partCanvas, glowCanvas].forEach(c => {
    c.width = window.innerWidth;
    c.height = window.innerHeight;
  });
}
resizeAll();
window.addEventListener('resize', resizeAll);

// Starfield with depth
const stars = Array.from({length:240}, () => ({
  x: Math.random(), y: Math.random(), r: Math.random() * 1.5 + 0.2,
  alpha: Math.random() * 0.6 + 0.2, speed: Math.random() * 0.003 + 0.001,
  phase: Math.random() * Math.PI * 2
}));

// Nebula particles (drifting clouds)
const nebulaParticles = Array.from({length:35}, () => ({
  x: Math.random(), y: Math.random(), radius: Math.random() * 40 + 15,
  alpha: Math.random() * 0.05 + 0.02, vx: (Math.random() - 0.5) * 0.0003,
  vy: (Math.random() - 0.5) * 0.0002
}));

// Floating dust particles
const dustParticles = Array.from({length:140}, () => ({
  x: Math.random(), y: Math.random(), r: Math.random() * 1.8 + 0.4,
  vx: (Math.random() - 0.5) * 0.00025,
  vy: (Math.random() - 0.5) * 0.0002 - 0.00012,
  alpha: Math.random() * 0.3 + 0.1,
  pulseSpeed: Math.random() * 0.02 + 0.005,
  phase: Math.random() * Math.PI * 2
}));

// Energy glow orbs
const glowOrbs = Array.from({length:8}, () => ({
  x: Math.random(), y: Math.random(), r: Math.random() * 70 + 30,
  intensity: Math.random() * 0.1 + 0.05,
  speedX: (Math.random() - 0.5) * 0.0002,
  speedY: (Math.random() - 0.5) * 0.0002
}));

function drawStarfield() {
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  const grad = bgCtx.createLinearGradient(0, 0, 0, bgCanvas.height);
  grad.addColorStop(0, '#020a15');
  grad.addColorStop(1, '#01060c');
  bgCtx.fillStyle = grad;
  bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
  
  stars.forEach(s => {
    const twinkle = 0.4 + 0.6 * Math.sin(time * s.speed * 2 + s.phase);
    bgCtx.beginPath();
    bgCtx.arc(s.x * bgCanvas.width, s.y * bgCanvas.height, s.r, 0, Math.PI*2);
    bgCtx.fillStyle = `rgba(140,178,208, ${s.alpha * twinkle})`;
    bgCtx.fill();
  });
}

function drawNebula() {
  nebulaCtx.clearRect(0, 0, nebulaCanvas.width, nebulaCanvas.height);
  nebulaParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if(p.x < -0.2) p.x = 1.2; if(p.x > 1.2) p.x = -0.2;
    if(p.y < -0.2) p.y = 1.2; if(p.y > 1.2) p.y = -0.2;
    nebulaCtx.beginPath();
    nebulaCtx.arc(p.x * nebulaCanvas.width, p.y * nebulaCanvas.height, p.radius, 0, Math.PI*2);
    nebulaCtx.fillStyle = `rgba(34,120,224, ${p.alpha + Math.sin(time*0.2)*0.02})`;
    nebulaCtx.fill();
  });
}

function drawDust() {
  partCtx.clearRect(0, 0, partCanvas.width, partCanvas.height);
  dustParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if(p.x < -0.05) p.x = 1.05;
    if(p.x > 1.05) p.x = -0.05;
    if(p.y < -0.05) p.y = 1.05;
    if(p.y > 1.05) p.y = -0.05;
    const breath = 0.5 + 0.5 * Math.sin(time * p.pulseSpeed + p.phase);
    partCtx.beginPath();
    partCtx.arc(p.x * partCanvas.width, p.y * partCanvas.height, p.r, 0, Math.PI*2);
    partCtx.fillStyle = `rgba(98,192,255, ${p.alpha * breath})`;
    partCtx.fill();
  });
}

function drawGlow() {
  glowCtx.clearRect(0, 0, glowCanvas.width, glowCanvas.height);
  glowOrbs.forEach(o => {
    o.x += o.speedX; o.y += o.speedY;
    if(o.x < -0.2) o.x = 1.2; if(o.x > 1.2) o.x = -0.2;
    if(o.y < -0.2) o.y = 1.2; if(o.y > 1.2) o.y = -0.2;
    const radGrad = glowCtx.createRadialGradient(o.x * glowCanvas.width, o.y * glowCanvas.height, 0, o.x * glowCanvas.width, o.y * glowCanvas.height, o.r);
    radGrad.addColorStop(0, `rgba(34,120,224, ${o.intensity * 0.4})`);
    radGrad.addColorStop(1, 'rgba(34,120,224, 0)');
    glowCtx.fillStyle = radGrad;
    glowCtx.fillRect(0, 0, glowCanvas.width, glowCanvas.height);
  });
}

function animateLayers() {
  time += 0.016;
  drawStarfield();
  drawNebula();
  drawDust();
  drawGlow();
  requestAnimationFrame(animateLayers);
}
animateLayers();

// Dynamic status text changing (creative storytelling)
const statusMessages = [
  "INITIALIZING SYSTEMS",
  "CONNECTING TO KPI STREAM",
  "LOADING 11 WEBSITES",
  "RENDERING POSTER ASSETS",
  "PROCESSING VIDEO METRICS",
  "FINALIZING REPORT DATA",
  "READY FOR PRESENTATION"
];
let msgIndex = 0;
const statusSpan = document.getElementById('statusText');
setInterval(() => {
  if(msgIndex < statusMessages.length - 1) {
    msgIndex++;
    statusSpan.textContent = statusMessages[msgIndex];
  }
}, 620);

// Simulate loading completion then redirect
let progressComplete = false;
setTimeout(() => {
  if(!progressComplete) {
    // final redirect after all done
    window.location.href = './REPORT/index.html';
  }
}, 4700);

// also listen to progress fill end (via animationend)
const progressFill = document.querySelector('.progress-fill');
progressFill.addEventListener('animationend', (e) => {
  if(e.animationName === 'progressExpand') {
    progressComplete = true;
    setTimeout(() => {
      window.location.href = './REPORT/index.html';
    }, 500);
  }
});

// Extra: mouse interactive parallax for ring system (subtle)
const ringSys = document.querySelector('.ring-system');
document.addEventListener('mousemove', (e) => {
  const x = (e.clientX / window.innerWidth - 0.5) * 5;
  const y = (e.clientY / window.innerHeight - 0.5) * 5;
  if(ringSys) ringSys.style.transform = `perspective(800px) rotateY(${x * 0.8}deg) rotateX(${-y * 0.6}deg)`;
});

// Force initial progress bar active
setTimeout(() => {
  if(document.querySelector('.progress-fill').style.width === '') return;
}, 100);
</script>
